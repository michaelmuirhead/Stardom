<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#171927" />
  <title>Stardom — An Actor's Journey</title>
  <link rel="stylesheet" href="css/styles.css" />

  <!-- PWA / Add to Home Screen -->
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" type="image/png" href="icons/icon-192.png" />
  <link rel="apple-touch-icon" href="icons/apple-touch-icon-180.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Stardom" />
</head>
<body>
  <!-- Start screen -->
  <div id="startScreen" class="start">
    <div class="start-card">
      <h1 class="logo">⭐ STARDOM</h1>
      <p class="tagline">From unknown to icon. Build an actor's career — auditions,
        TV, film, commercials, then write, direct &amp; produce your own.</p>
      <label class="start-field">
        <span>Your stage name</span>
        <input id="playerName" type="text" maxlength="28" placeholder="Leave blank for a random name" />
      </label>
      <div class="start-field">
        <span>Difficulty</span>
        <div id="difficulty" class="difficulty"></div>
      </div>
      <div class="start-actions">
        <button id="newBtn" class="btn primary big">🎬 New Career</button>
        <button id="continueBtn" class="btn big" style="display:none">↩️ Continue</button>
      </div>
      <p class="muted small">Tip: spend energy on auditions &amp; classes, then Advance the Week to make progress.</p>
    </div>
  </div>

  <!-- Game -->
  <div id="game" style="display:none">
    <header>
      <div class="brand">⭐ STARDOM</div>
      <div id="stats" class="stats"></div>
      <button id="help" class="btn" title="How to play">❓</button>
    </header>

    <div id="banner" class="banner"></div>

    <main>
      <section class="left">
        <nav id="tabs" class="tabs"></nav>
        <div id="panel" class="panel"></div>
      </section>
      <aside id="log" class="log"></aside>
    </main>

    <footer>
      <button id="advance" class="btn primary big">⏭️ Advance Week</button>
    </footer>
  </div>

  <div id="toast" class="toast"></div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
